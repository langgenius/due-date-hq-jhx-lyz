federal_overlay:
  description: Federal items to always append when the (entity_type, state) lookup succeeds; duplicates deduped by the Rule Engine.
  by_entity_type:
    llc: [federal_1065_or_1040]
    s_corp: [federal_1120s]
    partnership: [federal_1065]
    c_corp: [federal_1120]
    sole_prop: [federal_1040_sch_c]
    trust: [federal_1041]
    individual: [federal_1040]
    other: [federal]

fallback:
  strategy: federal_only_with_needs_review
  description: When (entity_type, state) is not in rules, emit federal overlay only and mark the client as needs_review.
  applies_to_states:
    - MA
    - TX
    - FL
    - WA
    - '*'
  evidence:
    source_type: default_inference_by_entity_state
    matrix_version: v1.0
    needs_review_reason: state_not_in_demo_sprint_seed

