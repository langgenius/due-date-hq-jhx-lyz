name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      WRANGLER_SEND_METRICS: 'false'
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install

      - run: vp run ci

      # Secret scan: gitleaks version pinned to match what developers install
      # locally (Day 1 rhythm §3); keep the CLI flags below aligned with the
      # `secrets:scan` script in package.json so CI and dev agree.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Keep in sync with the `secrets:scan` script in package.json.
      # We invoke gitleaks directly because `setup-vp` doesn't ship pnpm, and
      # pulling pnpm in just to run a one-liner isn't worth the complexity.
      - name: Secret scan
        run: gitleaks detect --source . --no-git --redact

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment: due-date-hq-staging
    env:
      CLOUDFLARE_ACCOUNT_ID: 8f7d374db5cb1f025b7f71e28b84c9bb
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WRANGLER_SEND_METRICS: 'false'
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install

      - name: Prepare Worker secrets
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const required = ['AUTH_SECRET', 'GOOGLE_CLIENT_SECRET']
          const missing = required.filter((key) => !process.env[key])
          if (missing.length > 0) {
            throw new Error(`Missing required environment secrets: ${missing.join(', ')}`)
          }

          const keys = [...required, 'RESEND_API_KEY', 'OPENAI_API_KEY']
          const secrets = Object.fromEntries(
            keys
              .filter((key) => process.env[key])
              .map((key) => [key, process.env[key]]),
          )
          const file = path.join(process.env.RUNNER_TEMP, 'duedatehq-worker-secrets.json')
          fs.writeFileSync(file, JSON.stringify(secrets))
          fs.appendFileSync(process.env.GITHUB_ENV, `WRANGLER_SECRETS_FILE=${file}\n`)
          NODE

      - run: vp run workspace-deploy
