name: Lingui Catalog Drift

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: i18n-catalog-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install --frozen-lockfile

      - name: Sync Lingui catalogs
        run: |
          vp run @duedatehq/app#i18n:extract
          vp run @duedatehq/app#i18n:compile

      - name: Check committed catalog output
        run: git diff --exit-code -- apps/app/src/i18n/locales
